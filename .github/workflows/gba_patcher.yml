name: GBA Batch Patcher (agb_edit Final Fix)
on: 
  workflow_dispatch:
    inputs:
      cia_url:
        description: 'Direct link to .cia (Optional)'
        required: false

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Setup agb_edit
        shell: pwsh
        run: |
          # 1. Download the correct zip
          $url = "https://github.com/joemck/agb_edit/releases/download/v0.2.0a/agb_edit_020a.zip"
          Invoke-WebRequest -Uri $url -OutFile "agb_edit.zip"
          
          # 2. Extract
          Expand-Archive -Path "agb_edit.zip" -DestinationPath "temp_setup"
          
          # 3. Create the target structure
          mkdir progfiles -Force
          mkdir input -Force
          mkdir output -Force
          
          # 4. Find where the files actually are (handles any internal folder names)
          $sourceDir = (Get-ChildItem -Path "temp_setup" -Filter "agb_edit.exe" -Recurse).DirectoryName
          
          # 5. Move agb_edit.exe to the ROOT
          Move-Item "$sourceDir\agb_edit.exe" ".\" -Force
          
          # 6. Move the dependencies (3dstool, makerom, etc.) into \progfiles\
          Get-ChildItem -Path $sourceDir -Exclude "agb_edit.exe" | Move-Item -Destination "progfiles\" -Force
          
          # Verify structure for the logs
          Write-Host "--- Root Directory ---"
          ls .
          Write-Host "--- Progfiles Directory ---"
          ls ./progfiles

      - name: Fetch Remote CIA (If URL provided)
        if: "${{ github.event.inputs.cia_url != '' }}"
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ github.event.inputs.cia_url }}" -OutFile "input/remote_game.cia"

      - name: Process CIAs
        shell: pwsh
        run: |
          $wshell = New-Object -ComObject wscript.shell
          
          Get-ChildItem "input/*.cia" | ForEach-Object {
            $oldName = $_.BaseName
            Write-Host "Patching: $($_.Name)"
            
            # 1. Start the process asynchronously so it doesn't block the shell
            $process = Start-Process -FilePath ".\agb_edit.exe" -ArgumentList "`"$($_.FullName)`"" -PassThru
            
            # 2. Wait for it to read the ROM header and display the prompt
            Start-Sleep -Seconds 3
            
            # 3. Focus the hidden console window using its Process ID
            $wshell.AppActivate($process.Id)
            Start-Sleep -Milliseconds 500
            
            # 4. Inject 'p' directly into the keyboard buffer (lowercase is safer)
            $wshell.SendKeys("p")
            
            # 5. Wait for it to finish unpacking, patching, and repacking the CIA
            $process.WaitForExit()
            
            # 6. Rename and move the result
            Move-Item "$($_.FullName)" "output/$($oldName)-patched.cia" -Force
          }

      - name: Upload Patched Files
        uses: actions/upload-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: output/
