name: GBA Batch Patcher (agb_edit Final)
on: 
  workflow_dispatch:
    inputs:
      cia_url:
        description: 'Direct link to .cia (Optional)'
        required: false

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Setup agb_edit
        shell: pwsh
        run: |
          # 1. Download release
          $url = "https://github.com/joemck/agb_edit/releases/download/v0.2.0a/agb_edit_020a.zip"
          Invoke-WebRequest -Uri $url -OutFile "agb_edit.zip"
          
          # 2. Extract and create the structure the tool expects
          Expand-Archive -Path "agb_edit.zip" -DestinationPath "temp_setup"
          mkdir progfiles -Force
          mkdir input -Force
          mkdir output -Force
          
          # 3. Move agb_edit.exe to root, others to progfiles
          Move-Item "temp_setup\agb_edit_v0.2.0a\agb_edit.exe" ".\"
          Move-Item "temp_setup\agb_edit_v0.2.0a\*" "progfiles\" -ErrorAction SilentlyContinue

      - name: Fetch Remote CIA (If URL provided)
        if: "${{ github.event.inputs.cia_url != '' }}"
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ github.event.inputs.cia_url }}" -OutFile "input/remote_game.cia"

      - name: Process CIAs
        shell: pwsh
        run: |
          Get-ChildItem "input/*.cia" | ForEach-Object {
            $oldName = $_.BaseName
            Write-Host "Patching: $($_.Name)"
            
            # Pipe 'P' for: Lid Sleep, Gamma 1.54, Ghosting & Vignette Removal
            echo "P" | .\agb_edit.exe "$($_.FullName)"
            
            # Move and rename to include -patched suffix
            Move-Item "$($_.FullName)" "output/$($oldName)-patched.cia"
          }

      - name: Upload Patched Files
        uses: actions/upload-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: output/
