name: GBA Batch Patcher
on:
  workflow_dispatch:
    inputs:
      cia_urls:
        description: 'Direct links to .cia files, one per line'
        required: false

permissions:
  contents: write

jobs:
  patch:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install MinGW (gcc)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false

      - name: Build agb_edit from patched source
        shell: msys2 {0}
        run: |
          cd src/agb_edit
          gcc -Os -o agb_edit.exe src/main.c src/gbacia.c src/videolut.c src/console_ui.c
          echo "--- Build output ---"
          ls -la agb_edit.exe

      - name: Setup directories
        shell: pwsh
        run: |
          mkdir input  -Force
          mkdir output -Force
          mkdir output\icons -Force

      - name: Fetch Remote CIAs (if URLs provided)
        if: "${{ github.event.inputs.cia_urls != '' }}"
        shell: pwsh
        run: |
          $urls = "${{ github.event.inputs.cia_urls }}" -split "`n" |
                  ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          $i = 1
          foreach ($url in $urls) {
            $encoded  = $url.Split('/')[-1].Split('?')[0]
            $filename = [System.Uri]::UnescapeDataString($encoded)
            if ($filename -notmatch '\.cia$') { $filename = "remote_game_$i.cia" }
            Write-Host "Downloading: $url -> input/$filename"
            Invoke-WebRequest -Uri $url -OutFile "input/$filename"
            $i++
          }

      - name: Process CIAs
        shell: pwsh
        run: |
          $agbEdit   = Resolve-Path "src/agb_edit/agb_edit.exe"
          $nsuiPatch = Resolve-Path "tools/nsui_patch.py"
          $workDir   = Split-Path $agbEdit
          $progfiles = Join-Path $workDir "progfiles"
          $ctrtool   = Join-Path $progfiles "ctrtool.exe"
          $dstool    = Join-Path $progfiles "3dstool.exe"
          $makerom   = Join-Path $progfiles "makerom.exe"
          $origDir   = $env:GITHUB_WORKSPACE

          $counter = 1

          Get-ChildItem "input/*.cia" | ForEach-Object {
            $inputFile   = $_.FullName
            $displayName = $_.BaseName
            Write-Host ""
            Write-Host "========================================"
            Write-Host "Processing [$counter]: $($_.Name)"
            Write-Host "========================================"

            $safeName    = "input_game"
            $safeInput   = Join-Path $workDir "$safeName.cia"
            $safeDump    = Join-Path $workDir "$safeName.gba"
            $safePatched = Join-Path $workDir "$safeName-slept.gba"
            $safeOutput  = Join-Path $workDir "$safeName (edit-sleepbtns-lcdghost-filter).cia"
            Copy-Item $inputFile $safeInput -Force

            function Run-AgbEdit($key) {
              $psi = New-Object System.Diagnostics.ProcessStartInfo
              $psi.FileName               = $agbEdit
              $psi.Arguments              = "`"$safeInput`""
              $psi.WorkingDirectory       = $workDir
              $psi.RedirectStandardInput  = $true
              $psi.RedirectStandardOutput = $true
              $psi.RedirectStandardError  = $true
              $psi.UseShellExecute        = $false
              $proc = [System.Diagnostics.Process]::Start($psi)
              $outTask = $proc.StandardOutput.ReadToEndAsync()
              $errTask = $proc.StandardError.ReadToEndAsync()
              $proc.StandardInput.WriteLine($key)
              $proc.StandardInput.Close()
              $proc.WaitForExit()
              Write-Host "=== agb_edit output (key='$key') ==="
              Write-Host $outTask.Result
              if ($errTask.Result) { Write-Host "STDERR: $($errTask.Result)" }
              return $proc.ExitCode
            }

            # ── Step 1: Dump the GBA ROM ──────────────────────────────────────
            Write-Host "--- Step 1: Dumping GBA ROM ---"
            $exitCode = Run-AgbEdit "d"
            if ($exitCode -ne 0) { Write-Error "agb_edit ROM dump failed (exit $exitCode)"; exit 1 }
            if (-not (Test-Path $safeDump)) { Write-Error "ROM dump not found: $safeDump"; exit 1 }
            Write-Host "ROM dumped: $safeDump ($(((Get-Item $safeDump).Length/1MB).ToString('F2')) MB)"
            # ── DEBUG: Scan for BX r1 candidates ──────────────────────────────
            Write-Host "--- DEBUG: Scanning for sleep routine ---"
            $romBytes = [System.IO.File]::ReadAllBytes($safeDump)
            Write-Host "ROM size: $($romBytes.Length) bytes"
            # Find all BX r1 (11 ff 2f e1) in first 128KB
            for ($i = 0; $i -lt [Math]::Min($romBytes.Length - 8, 0x20000); $i += 4) {
                if ($romBytes[$i] -eq 0x11 -and $romBytes[$i+1] -eq 0xff -and $romBytes[$i+2] -eq 0x2f -and $romBytes[$i+3] -eq 0xe1) {
                    $pre = "{0:X2} {1:X2} {2:X2} {3:X2}" -f $romBytes[$i-4],$romBytes[$i-3],$romBytes[$i-2],$romBytes[$i-1]
                    Write-Host "BX r1 @ 0x$($i.ToString('X8')): pre=[$pre]"
                }
            }
            # Find all ADD r0,pc,#N (XX 00 8f e2)
            for ($i = 0; $i -lt [Math]::Min($romBytes.Length - 8, 0x20000); $i += 4) {
                if ($romBytes[$i+1] -eq 0x00 -and $romBytes[$i+2] -eq 0x8f -and $romBytes[$i+3] -eq 0xe2) {
                    $next = "{0:X2} {1:X2} {2:X2} {3:X2}" -f $romBytes[$i+4],$romBytes[$i+5],$romBytes[$i+6],$romBytes[$i+7]
                    Write-Host "ADD r0,pc @ 0x$($i.ToString('X8')): next=[$next]"
                }
            }
            # ── DEBUG 2: Find 06 48 patterns near sleep routine ──────────────
            $p1Off = 0x224  # from previous output
            for ($i = 0; $i -lt [Math]::Min($romBytes.Length - 4, 0x10000); $i += 2) {
                if ($romBytes[$i] -eq 0x06 -and $romBytes[$i+1] -eq 0x48) {
                    $n = "{0:X2} {1:X2}" -f $romBytes[$i+2],$romBytes[$i+3]
                    Write-Host "06 48 @ 0x$($i.ToString('X8')): next=[$n]"
                }
            }
            # Also dump 0x200-0x400 as hex to see the data table around P2
            Write-Host "=== ROM[0x200-0x300] ==="
            for ($i = 0x200; $i -lt 0x300; $i += 16) {
                $row = ""
                for ($j = $i; $j -lt [Math]::Min($i+16, 0x300); $j++) {
                    $row += "{0:X2} " -f $romBytes[$j]
                }
                Write-Host "0x$($i.ToString('X4')): $row"
            }
            
            # ── Step 2: Extract SMDH icon (non-fatal) ────────────────────────
            Write-Host "--- Step 2: Extracting SMDH icon ---"
            try {
              $tmpIcon = Join-Path $workDir "ICONTMP"
              if (Test-Path $tmpIcon) { Remove-Item $tmpIcon -Recurse -Force }
              New-Item -ItemType Directory -Path $tmpIcon | Out-Null

              & $ctrtool --contents "$tmpIcon\file" "$safeInput" 2>$null | Out-Null
              $mainCxiIcon = (Get-ChildItem $tmpIcon | Sort-Object Length -Descending | Select-Object -First 1).FullName
              & $dstool -xtf cxi $mainCxiIcon --exefs "$tmpIcon\exefs.bin" 2>$null | Out-Null
              & $dstool -xtf exefs "$tmpIcon\exefs.bin" --exefs-dir "$tmpIcon\exefs" --header "$tmpIcon\exefsheader.bin" 2>$null | Out-Null

              $smdhPath = "$tmpIcon\exefs\icon.bin"
              if (Test-Path $smdhPath) {
                Copy-Item $smdhPath "$origDir\output\icons\processed-cia-$counter.bin" -Force
                Write-Host "Icon extracted -> output/icons/processed-cia-$counter.bin"
              } else {
                Write-Host "icon.bin not found in ExeFS — no icon for this title"
              }
              Remove-Item $tmpIcon -Recurse -Force
            } catch {
              Write-Host "Icon extraction failed (non-fatal): $_"
            }

            # ── Step 3: Apply NSUI-compatible sleep patch ─────────────────────
            Write-Host "--- Step 3: Applying NSUI sleep patch ---"
            $patchOut = & python3 $nsuiPatch $safeDump $safePatched --verbose 2>&1
            Write-Host $patchOut
            if ($LASTEXITCODE -ne 0) { Write-Error "NSUI sleep patch failed (exit $LASTEXITCODE)"; exit 1 }
            if (-not (Test-Path $safePatched)) { Write-Error "Patched ROM not found: $safePatched"; exit 1 }
            Write-Host "Sleep patch applied (wakes on lid open)."

            # ── Step 4: Splice patched ROM back into CIA ──────────────────────
            Write-Host "--- Step 4: Splicing patched ROM back into CIA ---"
            $tmpDir = Join-Path $workDir "UNPACKTMP"
            if (Test-Path $tmpDir) { Remove-Item $tmpDir -Recurse -Force }
            New-Item -ItemType Directory -Path $tmpDir | Out-Null

            & $ctrtool --contents "$tmpDir\file" "$safeInput"
            if ($LASTEXITCODE -ne 0) { Write-Error "ctrtool --contents failed"; exit 1 }

            $mainCxi = (Get-ChildItem $tmpDir | Sort-Object Length -Descending | Select-Object -First 1).Name

            & $dstool -xtf cxi "$tmpDir\$mainCxi" `
              --header "$tmpDir\ncchheader.bin" `
              --exh    "$tmpDir\exheader.bin"   `
              --exefs  "$tmpDir\exefs.bin"       `
              --romfs  "$tmpDir\romfs.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -xtf cxi failed"; exit 1 }

            & $dstool -xtf exefs "$tmpDir\exefs.bin" `
              --exefs-dir "$tmpDir\exefs"             `
              --header    "$tmpDir\exefsheader.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -xtf exefs failed"; exit 1 }

            $codeBin     = "$tmpDir\exefs\code.bin"
            $patchedRom  = [System.IO.File]::ReadAllBytes($safePatched)
            $codeBinData = [System.IO.File]::ReadAllBytes($codeBin)
            $romSize     = $patchedRom.Length
            if ($romSize -gt $codeBinData.Length) {
              Write-Error "Patched ROM ($romSize bytes) larger than code.bin ($($codeBinData.Length) bytes)!"
              exit 1
            }
            Write-Host "Splicing $romSize bytes into code.bin ($($codeBinData.Length) bytes total)"
            [System.Array]::Copy($patchedRom, $codeBinData, $romSize)
            [System.IO.File]::WriteAllBytes($codeBin, $codeBinData)

            & $dstool -ctf exefs "$tmpDir\newExefs.bin" `
              --exefs-dir "$tmpDir\exefs"                `
              --header    "$tmpDir\exefsheader.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -ctf exefs failed"; exit 1 }

            & $dstool -ctf cxi "$tmpDir\modified.cxi"  `
              --header "$tmpDir\ncchheader.bin"          `
              --exh    "$tmpDir\exheader.bin"            `
              --exefs  "$tmpDir\newExefs.bin"            `
              --romfs  "$tmpDir\romfs.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -ctf cxi failed"; exit 1 }

            $contentFiles = Get-ChildItem "$tmpDir\file.*" | Sort-Object Name
            $makeromArgs  = @("-f", "cia")
            foreach ($cf in $contentFiles) {
              $parts   = $cf.Name -split '\.'
              $fileNum = [Convert]::ToInt32($parts[1], 16).ToString()
              $indNum  = [Convert]::ToInt32($parts[2], 16).ToString()
              $cxiPath = if ($cf.Name -eq $mainCxi) { "UNPACKTMP\modified.cxi" } else { "UNPACKTMP\$($cf.Name)" }
              $makeromArgs += @("-content", "${cxiPath}:${fileNum}:${indNum}")
            }
            $makeromArgs += @("-o", "$safeName.cia")
            Set-Location $workDir
            & $makerom @makeromArgs
            if ($LASTEXITCODE -ne 0) { Write-Error "makerom failed"; exit 1 }
            Set-Location $origDir
            Remove-Item $tmpDir -Recurse -Force

            # ── Step 5: agb_edit preset fix ───────────────────────────────────
            Write-Host "--- Step 5: Applying agb_edit preset fix ---"
            $exitCode = Run-AgbEdit "p"
            if ($exitCode -ne 0) { Write-Error "agb_edit preset fix failed (exit $exitCode)"; exit 1 }
            if (-not (Test-Path $safeOutput)) {
              Write-Error "Expected output not found: $safeOutput"
              Get-ChildItem $workDir
              exit 1
            }

            # ── Numbered output filename — zero encoding ambiguity ────────────
            $outFilename = "processed-cia-$counter.cia"
            Move-Item $safeOutput "$origDir\output\$outFilename" -Force
            Remove-Item $safeInput   -Force -ErrorAction SilentlyContinue
            Remove-Item $safeDump    -Force -ErrorAction SilentlyContinue
            Remove-Item $safePatched -Force -ErrorAction SilentlyContinue

            Add-Content "$origDir\output\manifest.tsv" "$counter`t$displayName" -Encoding UTF8
            Write-Host "Done: output/$outFilename  (display: $displayName)"
            $counter++
          }

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "patch-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Tag: $tag"

      - name: Create GitHub Release and upload CIAs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Patched GBA CIAs — ${{ steps.tag.outputs.tag }}"
          body: "Auto-generated by GBA Batch Patcher workflow."
          files: output/*.cia

      - name: Upload artifact (CIAs + manifest + icons)
        uses: actions/upload-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: output/

  pages:
    runs-on: ubuntu-latest
    needs: patch
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: artifact

      - name: Install Python dependencies
        run: pip install "qrcode[pil]" pillow --quiet

      - name: Generate session page
        env:
          REPO: ${{ github.repository }}
          TAG:  ${{ needs.patch.outputs.tag }}
        run: |
          python3 - << 'PYEOF'
          import os, struct, qrcode
          from pathlib import Path
          from PIL import Image

          repo = os.environ["REPO"]
          tag  = os.environ["TAG"]

          # Load manifest: number -> display name
          manifest = {}
          manifest_path = Path("artifact/manifest.tsv")
          if manifest_path.exists():
              for line in manifest_path.read_text(encoding="utf-8").splitlines():
                  line = line.strip()
                  if "\t" in line:
                      num, display = line.split("\t", 1)
                      manifest[num.strip()] = display.strip()

          # SMDH icon decoder (RGB565, Morton-swizzled 8x8 tiles, 48x48 large icon)
          SMDH_MAGIC  = b'SMDH'
          ICON_OFFSET = 0x24C0
          TILE        = 8

          def morton_to_xy(z):
              x = y = 0
              for i in range(8):
                  x |= ((z >> (2*i))   & 1) << i
                  y |= ((z >> (2*i+1)) & 1) << i
              return x, y

          MORTON = [morton_to_xy(z) for z in range(TILE * TILE)]

          def rgb565(w):
              return ((w>>11)&0x1F)*255//31, ((w>>5)&0x3F)*255//63, (w&0x1F)*255//31

          def decode_icon(data):
              raw = data[ICON_OFFSET: ICON_OFFSET + 0x1200]
              img = Image.new("RGB", (48, 48))
              px  = img.load()
              idx = 0
              for ty in range(6):
                  for tx in range(6):
                      for z in range(TILE*TILE):
                          lx, ly = MORTON[z]
                          word = struct.unpack_from("<H", raw, idx)[0]; idx += 2
                          px[tx*TILE+lx, ty*TILE+ly] = rgb565(word)
              return img.resize((96, 96), Image.NEAREST)

          # Build session directories
          session_dir = Path(f"sessions/{tag}")
          qr_dir      = session_dir / "qr"
          icon_dir    = session_dir / "icons"
          qr_dir.mkdir(parents=True, exist_ok=True)
          icon_dir.mkdir(parents=True, exist_ok=True)

          cards = []

          for cia_path in sorted(Path("artifact").glob("processed-cia-*.cia"),
                                  key=lambda p: int(p.stem.split("-")[-1])):
              num      = cia_path.stem.split("-")[-1]
              filename = cia_path.name
              label    = manifest.get(num, filename)
              url      = f"https://github.com/{repo}/releases/download/{tag}/{filename}"

              # QR code
              qr_out = qr_dir / f"{filename}.png"
              qrcode.make(url).save(qr_out)
              print(f"QR [{num}]: {url}")

              # Icon
              icon_html = ""
              smdh_src  = Path(f"artifact/icons/processed-cia-{num}.bin")
              if smdh_src.exists():
                  try:
                      data = smdh_src.read_bytes()
                      if data[:4] == SMDH_MAGIC:
                          icon_png = icon_dir / f"processed-cia-{num}.png"
                          decode_icon(data).save(icon_png)
                          icon_html = f'<img class="game-icon" src="icons/processed-cia-{num}.png" alt="">'
                          print(f"  Icon decoded: {icon_png}")
                      else:
                          print(f"  SMDH magic mismatch for [{num}]")
                  except Exception as e:
                      print(f"  Icon decode failed [{num}]: {e}")

              cards.append(f"""<div class="card">
                {icon_html}
                <img class="qr" src="qr/{filename}.png" alt="QR">
                <p class="label">{label}</p>
                <a class="dl" href="{url}">Direct link</a>
              </div>""")

          cards_html = "\n".join(cards)

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GBA.PATCH — {tag}</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
            <style>
              *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}
              :root {{
                --bg: #0a0a0f; --panel: #0f0f1a; --border: #1e2040;
                --accent: #00ff88; --accent2: #0077ff; --red: #e94560;
                --text: #c8d0e0; --dim: #5a6080;
              }}
              body {{
                background: var(--bg); color: var(--text);
                font-family: 'Share Tech Mono', monospace;
                min-height: 100vh; padding: 2rem;
              }}
              body::before {{
                content: ''; position: fixed; inset: 0;
                background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px);
                pointer-events: none; z-index: 999;
              }}
              header {{
                max-width: 1100px; margin: 0 auto 2.5rem;
                display: flex; align-items: center; justify-content: space-between;
                flex-wrap: wrap; gap: 1rem;
                border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;
              }}
              .logo {{
                font-family: 'Orbitron', sans-serif; font-weight: 900;
                font-size: clamp(1.3rem, 3vw, 2rem);
                color: var(--accent); text-shadow: 0 0 20px rgba(0,255,136,0.4);
              }}
              .logo span {{ color: var(--red); }}
              .tag-label {{ font-size: 0.65rem; color: var(--dim); letter-spacing: 0.15em; margin-top: 0.25rem; }}
              .back {{
                font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700;
                letter-spacing: 0.1em; text-transform: uppercase;
                color: var(--dim); border: 1px solid var(--border);
                padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none;
                transition: color 0.15s, border-color 0.15s;
              }}
              .back:hover {{ color: var(--text); border-color: var(--dim); }}
              main {{ max-width: 1100px; margin: 0 auto; }}
              .grid {{
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
              }}
              .card {{
                background: var(--panel); border: 1px solid var(--border);
                border-radius: 8px; padding: 1.25rem 1rem;
                display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
                transition: border-color 0.2s;
              }}
              .card:hover {{ border-color: rgba(0,255,136,0.25); }}
              .game-icon {{
                width: 72px; height: 72px; image-rendering: pixelated;
                border-radius: 10px; border: 1px solid var(--border);
              }}
              .qr {{ width: 150px; height: 150px; background: white; padding: 5px; border-radius: 5px; }}
              .label {{ font-size: 0.72rem; color: var(--text); text-align: center; word-break: break-word; line-height: 1.4; }}
              .dl {{ font-size: 0.65rem; color: var(--accent2); text-decoration: none; opacity: 0.7; transition: opacity 0.15s; }}
              .dl:hover {{ opacity: 1; text-decoration: underline; }}
              footer {{
                max-width: 1100px; margin: 3rem auto 0;
                border-top: 1px solid var(--border); padding-top: 1.5rem;
                font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em;
              }}
              footer a {{ color: var(--dim); }}
            </style>
          </head>
          <body>
            <header>
              <div>
                <div class="logo">GBA<span>.</span>PATCH</div>
                <div class="tag-label">{tag} &bull; {len(cards)} title(s) &bull; Scan with FBI</div>
              </div>
              <a class="back" href="/">&#8592; New Session</a>
            </header>
            <main><div class="grid">{cards_html}</div></main>
            <footer>
              GBA.PATCH &bull;
              <a href="https://github.com/{repo}/releases/tag/{tag}">View Release on GitHub</a>
            </footer>
          </body>
          </html>"""

          (session_dir / "index.html").write_text(html, encoding="utf-8")
          print(f"Session page written: sessions/{tag}/index.html ({len(cards)} cards)")
          PYEOF

      - name: Update latest.txt and push
        run: |
          TAG="${{ needs.patch.outputs.tag }}"
          echo "$TAG" > sessions/latest.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sessions/
          git status
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Session: $TAG"
          git push origin gh-pages
