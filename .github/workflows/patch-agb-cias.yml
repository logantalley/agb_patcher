name: GBA Batch Patcher (agb_edit Final Fix)
on:
  workflow_dispatch:
    inputs:
      cia_urls:
        description: 'Direct links to .cia files, one per line (Optional)'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  patch:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install MinGW (gcc)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false

      - name: Build agb_edit from patched source
        shell: msys2 {0}
        run: |
          cd src/agb_edit
          gcc -Os -o agb_edit.exe src/main.c src/gbacia.c src/videolut.c src/console_ui.c
          echo "--- Build output ---"
          ls -la agb_edit.exe

      - name: Setup directories
        shell: pwsh
        run: |
          mkdir input  -Force
          mkdir output -Force

      - name: Fetch Remote CIAs (If URLs provided)
        if: "${{ github.event.inputs.cia_urls != '' }}"
        shell: pwsh
        run: |
          $urls = "${{ github.event.inputs.cia_urls }}" -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          $i = 1
          foreach ($url in $urls) {
            $encoded  = $url.Split('/')[-1].Split('?')[0]
            $filename = [System.Uri]::UnescapeDataString($encoded)
            if ($filename -notmatch '\.cia$') { $filename = "remote_game_$i.cia" }
            Write-Host "Downloading: $url -> input/$filename"
            Invoke-WebRequest -Uri $url -OutFile "input/$filename"
            $i++
          }

      - name: Process CIAs
        shell: pwsh
        run: |
          $agbEdit   = Resolve-Path "src/agb_edit/agb_edit.exe"
          $sleepTool = Resolve-Path "tools/gba-sleephack-patcher-tool.exe"
          $workDir   = Split-Path $agbEdit
          $progfiles = Join-Path $workDir "progfiles"
          $ctrtool   = Join-Path $progfiles "ctrtool.exe"
          $dstool    = Join-Path $progfiles "3dstool.exe"
          $makerom   = Join-Path $progfiles "makerom.exe"
          $origDir   = $env:GITHUB_WORKSPACE

          Get-ChildItem "input/*.cia" | ForEach-Object {
            $inputFile = $_.FullName
            $oldName   = $_.BaseName
            Write-Host ""
            Write-Host "========================================"
            Write-Host "Processing: $($_.Name)"
            Write-Host "========================================"

            # --- Copy to safe ASCII filename to avoid Unicode issues ---
            $safeName    = "input_game"
            $safeInput   = Join-Path $workDir "$safeName.cia"
            $safeDump    = Join-Path $workDir "$safeName.gba"
            $safePatched = Join-Path $workDir "$safeName-slept.gba"
            $safeOutput  = Join-Path $workDir "$safeName (edit-sleepbtns-lcdghost-filter).cia"
            Copy-Item $inputFile $safeInput -Force

            # Helper to run agb_edit with a given stdin key
            function Run-AgbEdit($key) {
              $psi = New-Object System.Diagnostics.ProcessStartInfo
              $psi.FileName               = $agbEdit
              $psi.Arguments              = "`"$safeInput`""
              $psi.WorkingDirectory       = $workDir
              $psi.RedirectStandardInput  = $true
              $psi.RedirectStandardOutput = $true
              $psi.RedirectStandardError  = $true
              $psi.UseShellExecute        = $false
              $proc = [System.Diagnostics.Process]::Start($psi)
              $outTask = $proc.StandardOutput.ReadToEndAsync()
              $errTask = $proc.StandardError.ReadToEndAsync()
              $proc.StandardInput.WriteLine($key)
              $proc.StandardInput.Close()
              $proc.WaitForExit()
              Write-Host "=== agb_edit output (key='$key') ==="
              Write-Host $outTask.Result
              if ($errTask.Result) { Write-Host "STDERR: $($errTask.Result)" }
              return $proc.ExitCode
            }

            # --- Step 1: Dump the GBA ROM out of the CIA ---
            Write-Host "--- Step 1: Dumping GBA ROM ---"
            $exitCode = Run-AgbEdit "d"
            if ($exitCode -ne 0) { Write-Error "agb_edit ROM dump failed (exit $exitCode)"; exit 1 }
            if (-not (Test-Path $safeDump)) { Write-Error "ROM dump not found at: $safeDump"; exit 1 }
            Write-Host "ROM dumped: $safeDump ($(((Get-Item $safeDump).Length / 1MB).ToString('F2')) MB)"

            # --- Step 2: Apply sleep patch to the GBA ROM ---
            Write-Host "--- Step 2: Applying sleep patch ---"
            $psi2 = New-Object System.Diagnostics.ProcessStartInfo
            $psi2.FileName               = $sleepTool
            $psi2.Arguments              = "`"$safeDump`" `"$safePatched`" --sleep-combo L+R+Select --no-hard-reset"
            $psi2.WorkingDirectory       = $workDir
            $psi2.RedirectStandardOutput = $true
            $psi2.RedirectStandardError  = $true
            $psi2.UseShellExecute        = $false
            $proc2 = [System.Diagnostics.Process]::Start($psi2)
            $outTask2 = $proc2.StandardOutput.ReadToEndAsync()
            $errTask2 = $proc2.StandardError.ReadToEndAsync()
            $proc2.WaitForExit()
            Write-Host "=== sleephack output ==="
            Write-Host $outTask2.Result
            if ($errTask2.Result) { Write-Host "STDERR: $($errTask2.Result)" }
            if ($proc2.ExitCode -ne 0) { Write-Error "Sleep patch failed (exit $($proc2.ExitCode))"; exit 1 }
            if (-not (Test-Path $safePatched)) { Write-Error "Patched ROM not found at: $safePatched"; exit 1 }
            Write-Host "Sleep patch applied: $safePatched"

            # --- Step 3: Splice the patched ROM back into the CIA ---
            Write-Host "--- Step 3: Splicing patched ROM back into CIA ---"

            $tmpDir = Join-Path $workDir "UNPACKTMP"
            if (Test-Path $tmpDir) { Remove-Item $tmpDir -Recurse -Force }
            New-Item -ItemType Directory -Path $tmpDir | Out-Null

            # Unpack CIA contents
            & $ctrtool --contents "$tmpDir\file" "$safeInput"
            if ($LASTEXITCODE -ne 0) { Write-Error "ctrtool --contents failed"; exit 1 }

            # Find the largest file (the main CXI)
            $mainCxi = (Get-ChildItem $tmpDir | Sort-Object Length -Descending | Select-Object -First 1).Name

            # Unpack CXI
            & $dstool -xtf cxi "$tmpDir\$mainCxi" `
              --header "$tmpDir\ncchheader.bin" `
              --exh    "$tmpDir\exheader.bin"   `
              --exefs  "$tmpDir\exefs.bin"       `
              --romfs  "$tmpDir\romfs.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -xtf cxi failed"; exit 1 }

            # Unpack exefs
            & $dstool -xtf exefs "$tmpDir\exefs.bin" `
              --exefs-dir "$tmpDir\exefs"             `
              --header    "$tmpDir\exefsheader.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -xtf exefs failed"; exit 1 }

            # Splice: overwrite the first N bytes of code.bin with the patched ROM
            $codeBin     = "$tmpDir\exefs\code.bin"
            $patchedRom  = [System.IO.File]::ReadAllBytes($safePatched)
            $codeBinData = [System.IO.File]::ReadAllBytes($codeBin)
            $romSize     = $patchedRom.Length
            if ($romSize -gt $codeBinData.Length) {
              Write-Error "Patched ROM ($romSize bytes) is larger than code.bin ($($codeBinData.Length) bytes)!"
              exit 1
            }
            Write-Host "Splicing $romSize bytes of patched ROM into code.bin ($($codeBinData.Length) bytes total)"
            [System.Array]::Copy($patchedRom, $codeBinData, $romSize)
            [System.IO.File]::WriteAllBytes($codeBin, $codeBinData)
            Write-Host "Splice complete"

            # Repack exefs
            & $dstool -ctf exefs "$tmpDir\newExefs.bin" `
              --exefs-dir "$tmpDir\exefs"                `
              --header    "$tmpDir\exefsheader.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -ctf exefs failed"; exit 1 }

            # Repack CXI
            & $dstool -ctf cxi "$tmpDir\modified.cxi"  `
              --header "$tmpDir\ncchheader.bin"          `
              --exh    "$tmpDir\exheader.bin"            `
              --exefs  "$tmpDir\newExefs.bin"            `
              --romfs  "$tmpDir\romfs.bin"
            if ($LASTEXITCODE -ne 0) { Write-Error "3dstool -ctf cxi failed"; exit 1 }

            # Reassemble CIA using relative paths (makerom requires this)
            $contentFiles = Get-ChildItem "$tmpDir\file.*" | Sort-Object Name
            $makeromArgs  = @("-f", "cia")
            foreach ($cf in $contentFiles) {
              $parts   = $cf.Name -split '\.'
              $fileNum = [Convert]::ToInt32($parts[1], 16).ToString()
              $indNum  = [Convert]::ToInt32($parts[2], 16).ToString()
              $cxiPath = if ($cf.Name -eq $mainCxi) { "UNPACKTMP\modified.cxi" } else { "UNPACKTMP\$($cf.Name)" }
              $makeromArgs += @("-content", "${cxiPath}:${fileNum}:${indNum}")
            }
            $makeromArgs += @("-o", "$safeName.cia")
            Write-Host "Running: makerom $makeromArgs"
            Set-Location $workDir
            & $makerom @makeromArgs
            if ($LASTEXITCODE -ne 0) { Write-Error "makerom failed"; exit 1 }
            Set-Location $origDir

            # Clean up temp dir
            Remove-Item $tmpDir -Recurse -Force

            # --- Step 4: Run agb_edit preset quick-fix (gamma + button combo) ---
            Write-Host "--- Step 4: Applying agb_edit preset fix ---"
            $exitCode = Run-AgbEdit "p"
            if ($exitCode -ne 0) { Write-Error "agb_edit preset fix failed (exit $exitCode)"; exit 1 }
            if (-not (Test-Path $safeOutput)) {
              Write-Error "Expected output not found: $safeOutput"
              Write-Host "Contents of workDir:"
              Get-ChildItem $workDir
              exit 1
            }

            # --- Move final result to output/ with original name restored ---
            Move-Item $safeOutput "$origDir\output\$oldName-patched.cia" -Force
            Remove-Item $safeInput   -Force -ErrorAction SilentlyContinue
            Remove-Item $safeDump    -Force -ErrorAction SilentlyContinue
            Remove-Item $safePatched -Force -ErrorAction SilentlyContinue
            Write-Host "Done: output/$oldName-patched.cia"
          }

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "patch-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Tag: $tag"

      - name: Create GitHub Release and upload CIAs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Patched GBA CIAs — ${{ steps.tag.outputs.tag }}"
          body: "Auto-generated by GBA Batch Patcher workflow."
          files: output/*.cia

      - name: Upload patched CIAs as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: output/

  pages:
    runs-on: ubuntu-latest
    needs: patch
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download patched CIAs from artifact
        uses: actions/download-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: cias

      - name: Install Python dependencies
        run: pip install "qrcode[pil]" pillow --quiet

      - name: Generate QR codes and index.html
        env:
          REPO: ${{ github.repository }}
          TAG:  ${{ needs.patch.outputs.tag }}
        run: |
          mkdir -p qr
          python3 - << 'PYEOF'
          import os, urllib.parse, qrcode

          repo = os.environ["REPO"]
          tag  = os.environ["TAG"]

          cia_dir = "cias"
          cards   = []

          for filename in sorted(os.listdir(cia_dir)):
              if not filename.endswith(".cia"):
                  continue
              encoded  = urllib.parse.quote(filename)
              url      = f"https://github.com/{repo}/releases/download/{tag}/{encoded}"
              safe     = "".join(c if c.isalnum() or c in "._-" else "_" for c in filename)
              qr_path  = f"qr/{safe}.png"
              label    = filename.replace("-patched.cia", "")

              img = qrcode.make(url)
              img.save(qr_path)
              print(f"QR saved: {qr_path}")

              cards.append(f"""
              <div class="card">
                <img src="{qr_path}" alt="QR for {label}">
                <p>{label}</p>
                <a href="{url}">Direct link</a>
              </div>""")

          cards_html = "\n".join(cards)

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Patched GBA CIAs — {tag}</title>
            <style>
              body {{
                font-family: sans-serif;
                background: #1a1a2e;
                color: #eee;
                text-align: center;
                padding: 2rem;
                margin: 0;
              }}
              h1 {{ color: #e94560; margin-bottom: 0.25rem; }}
              .subtitle {{ color: #aaa; font-size: 0.9rem; margin-bottom: 2rem; }}
              .grid {{
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 2rem;
              }}
              .card {{
                background: #16213e;
                border: 1px solid #e9456044;
                border-radius: 12px;
                padding: 1.5rem;
                width: 220px;
              }}
              .card img {{
                width: 180px;
                height: 180px;
                border-radius: 8px;
                background: white;
                padding: 6px;
                display: block;
                margin: 0 auto 1rem;
              }}
              .card p {{
                font-size: 0.85rem;
                word-break: break-word;
                margin: 0 0 0.75rem;
                color: #ccc;
              }}
              .card a {{
                font-size: 0.8rem;
                color: #e94560;
                text-decoration: none;
              }}
              .card a:hover {{ text-decoration: underline; }}
              footer {{ margin-top: 3rem; font-size: 0.75rem; color: #555; }}
              footer a {{ color: #555; }}
            </style>
          </head>
          <body>
            <h1>Patched GBA CIAs</h1>
            <p class="subtitle">Release: {tag} &nbsp;|&nbsp; Scan with FBI on your 3DS</p>
            <div class="grid">
              {cards_html}
            </div>
            <footer>
              Generated by GBA Batch Patcher &bull;
              <a href="https://github.com/{repo}/releases/tag/{tag}">View Release</a>
            </footer>
          </body>
          </html>"""

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print(f"index.html written — {len(cards)} card(s)")
          PYEOF

      - name: Commit and push to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html qr/
          git status
          git commit -m "Update QR page for ${{ needs.patch.outputs.tag }}"
          git push origin gh-pages
