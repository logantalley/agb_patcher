name: AGB Patcher
on:
  workflow_dispatch:
    inputs:
      cia_urls:
        description: 'Direct links to .cia files, one per line (Optional)'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  patch:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install MinGW (gcc)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false

      - name: Build agb_edit from patched source
        shell: msys2 {0}
        run: |
          cd src/agb_edit
          gcc -Os -o agb_edit.exe src/main.c src/gbacia.c src/videolut.c src/console_ui.c
          echo "--- Build output ---"
          ls -la agb_edit.exe

      - name: Setup directories
        shell: pwsh
        run: |
          mkdir input  -Force
          mkdir output -Force

      - name: Fetch Remote CIAs (If URLs provided)
        if: "${{ github.event.inputs.cia_urls != '' }}"
        shell: pwsh
        run: |
          $urls = "${{ github.event.inputs.cia_urls }}" -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          $i = 1
          foreach ($url in $urls) {
            Write-Host "Downloading ($i): $url"
            Invoke-WebRequest -Uri $url -OutFile "input/remote_game_$i.cia"
            $i++
          }

      - name: Process CIAs
        shell: pwsh
        run: |
          $agbEdit = Resolve-Path "src/agb_edit/agb_edit.exe"
          $workDir = Split-Path $agbEdit

          Get-ChildItem "input/*.cia" | ForEach-Object {
            $inputFile = $_.FullName
            $oldName   = $_.BaseName
            Write-Host "Patching: $($_.Name)"

            $safeName   = "input_game"
            $safeInput  = Join-Path $workDir "$safeName.cia"
            $safeOutput = Join-Path $workDir "$safeName (edit-sleepbtns-lcdghost-filter).cia"
            Copy-Item $inputFile $safeInput -Force

            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName               = $agbEdit
            $psi.Arguments              = "`"$safeInput`""
            $psi.WorkingDirectory       = $workDir
            $psi.RedirectStandardInput  = $true
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError  = $true
            $psi.UseShellExecute        = $false

            $process = [System.Diagnostics.Process]::Start($psi)

            $stdoutTask = $process.StandardOutput.ReadToEndAsync()
            $stderrTask = $process.StandardError.ReadToEndAsync()

            $process.StandardInput.WriteLine("p")
            $process.StandardInput.Close()

            $process.WaitForExit()

            $stdout = $stdoutTask.Result
            $stderr = $stderrTask.Result

            Write-Host "Exit code: $($process.ExitCode)"
            Write-Host "=== agb_edit output ==="
            Write-Host $stdout
            if ($stderr) { Write-Host "STDERR: $stderr" }

            if (Test-Path $safeOutput) {
              Move-Item $safeOutput "output/$oldName-patched.cia" -Force
              Remove-Item $safeInput -Force -ErrorAction SilentlyContinue
              Write-Host "Success: output/$oldName-patched.cia"
            } else {
              Write-Error "Expected output not found: $safeOutput"
              Write-Host "Contents of workDir:"
              Get-ChildItem $workDir
              exit 1
            }
          }

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "patch-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Tag: $tag"

      - name: Create GitHub Release and upload CIAs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Patched GBA CIAs — ${{ steps.tag.outputs.tag }}"
          body: "Auto-generated by GBA Batch Patcher workflow."
          files: output/*.cia

      - name: Upload patched CIAs as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: output/

  pages:
    runs-on: ubuntu-latest
    needs: patch
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download patched CIAs from artifact
        uses: actions/download-artifact@v4
        with:
          name: Patched-GBA-CIAs
          path: cias

      - name: Generate QR code page
        run: |
          pip install qrcode[pil] pillow --quiet

          REPO="${{ github.repository }}"
          TAG="${{ needs.patch.outputs.tag }}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          REPONAME=$(echo "$REPO" | cut -d'/' -f2)

          mkdir -p qr

          # Build each QR code image and collect HTML cards
          CARDS=""
          for cia in cias/*.cia; do
            FILENAME=$(basename "$cia")
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$FILENAME'''))")
            URL="https://github.com/${REPO}/releases/download/${TAG}/${ENCODED}"
            SAFE=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            QRFILE="qr/${SAFE}.png"

            python3 - <<PYEOF
          import qrcode
          img = qrcode.make("$URL")
          img.save("$QRFILE")
          PYEOF

            LABEL=$(echo "$FILENAME" | sed 's/-patched\.cia$//')
            CARDS="${CARDS}
            <div class=\"card\">
              <img src=\"qr/${SAFE}.png\" alt=\"QR for ${LABEL}\">
              <p>${LABEL}</p>
              <a href=\"${URL}\">Direct link</a>
            </div>"
          done

          cat > index.html << HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Patched GBA CIAs — ${TAG}</title>
            <style>
              body {
                font-family: sans-serif;
                background: #1a1a2e;
                color: #eee;
                text-align: center;
                padding: 2rem;
                margin: 0;
              }
              h1 { color: #e94560; margin-bottom: 0.25rem; }
              .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 2rem; }
              .grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 2rem;
              }
              .card {
                background: #16213e;
                border: 1px solid #e9456044;
                border-radius: 12px;
                padding: 1.5rem;
                width: 220px;
              }
              .card img {
                width: 180px;
                height: 180px;
                border-radius: 8px;
                background: white;
                padding: 6px;
                display: block;
                margin: 0 auto 1rem;
              }
              .card p {
                font-size: 0.85rem;
                word-break: break-word;
                margin: 0 0 0.75rem;
                color: #ccc;
              }
              .card a {
                font-size: 0.8rem;
                color: #e94560;
                text-decoration: none;
              }
              .card a:hover { text-decoration: underline; }
              footer { margin-top: 3rem; font-size: 0.75rem; color: #555; }
            </style>
          </head>
          <body>
            <h1>Patched GBA CIAs</h1>
            <p class="subtitle">Release: ${TAG} &nbsp;|&nbsp; Scan with FBI on your 3DS</p>
            <div class="grid">
              ${CARDS}
            </div>
            <footer>Generated by GBA Batch Patcher &bull; <a href="https://github.com/${REPO}/releases/tag/${TAG}" style="color:#555">View Release</a></footer>
          </body>
          </html>
          HTML

          echo "Generated index.html"
          ls -la qr/

      - name: Commit and push to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html qr/
          git commit -m "Update QR page for ${{ needs.patch.outputs.tag }}" || echo "Nothing to commit"
          git push origin gh-pages
